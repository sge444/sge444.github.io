<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>O-Clock</title>
  <style>
    body { font-family: Verdana, sans-serif; font-size: 13px; }
    #clock { font-weight: 700; font-size: 50px; }
    .btn-audio { padding: 5px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <form id="form1" onsubmit="return false;">
    <div style="font-size: 2em; color: #008080; margin-bottom: 10px;">Orienteering Watches</div>
    <button type="button" id="audio-init" class="btn-audio">Включить звук (Click to Start Audio)</button>
    <label style="display:none;" id="sound-label">
      <input type="checkbox" name="soundon" checked> Sound ON
    </label>
    &nbsp;&nbsp;
    Font:
    <select name="font_size">
      <option value="50">50</option><option value="100">100</option><option value="150">150</option>
      <option value="200">200</option><option value="250">250</option><option value="300">300</option>
    </select> px
    &nbsp;&nbsp;
    PreStart:
    <select name="prestart">
      <option value="0">0</option><option value="1">1</option>
      <option value="2">2</option><option value="3">3</option>
      <option value="4">4</option>
    </select> minute(s)
    &nbsp;&nbsp;
    Start Time: <span id="clock-original">0:00:00</span>
  </form>

  <p><span id="clock">0:00:00</span></p>

  <script>
    const form = document.getElementById('form1');
    const clock = document.getElementById('clock');
    const clockOriginal = document.getElementById('clock-original');
    const audioBtn = document.getElementById('audio-init');
    const soundLabel = document.getElementById('sound-label');
    
    let audioCtx = null;
    let lastSecond = -1;

    // Инициализация звука строго по нажатию кнопки
    audioBtn.addEventListener('click', () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      audioBtn.style.display = 'none';
      soundLabel.style.display = 'inline';
    });

    const beep = (freq = 440, duration = 0.12, volume = 0.2, type = 'sine') => {
      if (!audioCtx || audioCtx.state === 'suspended') return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = volume;
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {
        console.error(e);
      }
    };

    const pad = n => String(n).padStart(2, '0');

    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();

      // Срабатывает строго один раз в секунду
      if (s !== lastSecond) {
        lastSecond = s;

        if (form.soundon.checked) {
          if (s === 0) beep(1200, 0.5, 0.50, 'sine');
          else if (s > 54 && s <= 59) beep(800, 0.25, 0.25, 'triangle');
        }

        const pre = Number(form.prestart.value);
        let ph = h;
        let pm = m + pre;
        if (pm > 59) {
          pm -= 60;
          ph = (ph + 1) % 24;
        }

        clockOriginal.textContent = `${h}:${pad(m)}:${pad(s)}`;
        clock.textContent = `${ph}:${pad(pm)}:${pad(s)}`;
      }

      // Запускает проверку на каждый кадр анимации (работает автономно и плавно)
      requestAnimationFrame(updateClock);
    }

    form.font_size.addEventListener('change', () => {
      clock.style.fontSize = `${form.font_size.value}px`;
    });

    // Запуск цикла часов
    updateClock();
	
	
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js') // Без слэша в начале!
        .then(reg => console.log('Service Worker успешно зарегистрирован!', reg))
        .catch(err => console.log('Ошибка регистрации Service Worker:', err));
    });
  }
	
	
  </script>
</body>
</html>
